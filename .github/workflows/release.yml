name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npx electron-vite build

      - name: Package Windows installer
        run: npx electron-builder --win --x64 --config electron-builder.config.js --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*-setup.exe
            dist/*.exe
          if-no-files-found: error
          retention-days: 1

  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npx electron-vite build

      - name: Package macOS arm64 DMG
        run: npx electron-builder --mac --arm64 --config electron-builder.config.js --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-dmg
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 1

  build-mac-x64:
    runs-on: macos-latest    # ARM runner, cross-compila x64 (macos-13 ritirato dic 2025)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install sharp x64 binaries for cross-compilation
        run: npm install @img/sharp-darwin-x64 @img/sharp-libvips-darwin-x64 --force --no-save

      - name: Build renderer + main
        run: npx electron-vite build

      - name: Package macOS x64 DMG
        run: npx electron-builder --mac --x64 --config electron-builder.config.js --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64-dmg
          path: dist/*.dmg
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [build-windows, build-mac-arm64, build-mac-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Anonimator ${{ github.ref_name }}"
          body: |
            ## Installazione

            Scarica il file per il tuo Mac:
            - **Mac Apple Silicon (M1/M2/M3/M4):** `*-arm64.dmg`
            - **Mac Intel:** `*-x64.dmg`
            - **Windows:** `*-setup.exe`

            Trascina `Anonimator.app` nella cartella Applicazioni, poi esegui una volta:
            ```bash
            sudo xattr -cr /Applications/Anonimator.app
            ```

            ---

            ${{ steps.changelog.outputs.notes }}
          files: |
            artifacts/mac-arm64-dmg/*.dmg
            artifacts/mac-x64-dmg/*.dmg
            artifacts/windows-installer/*.exe
          draft: false
          prerelease: false
